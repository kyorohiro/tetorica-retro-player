name: Build Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86
            runs-on: ubuntu-24.04
            args: "--config src-tauri/tauri.ffmpeg.conf.json -- --features ffmpeg-sidecar"
            cli_archive: tetorica-retro-player-linux-x86.tar.gz
            ffmpeg_url: "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
            ffmpeg_bin: ffmpeg-x86_64-unknown-linux-gnu

          - platform: linux-arm
            runs-on: ubuntu-24.04-arm
            args: "--config src-tauri/tauri.ffmpeg.conf.json -- --features ffmpeg-sidecar"
            cli_archive: tetorica-retro-player-linux-arm.tar.gz
            ffmpeg_url: "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linuxarm64-gpl.tar.xz"
            ffmpeg_bin: ffmpeg-aarch64-unknown-linux-gnu

          - platform: windows
            runs-on: windows-latest
            args: "--config src-tauri/tauri.ffmpeg.conf.json -- --features ffmpeg-sidecar"
            cli_archive: tetorica-retro-player-windows-x86_64.zip
            ffmpeg_url: "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
            ffmpeg_bin: ffmpeg-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Download ffmpeg sidecar (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L "${{ matrix.ffmpeg_url }}" | tar xJ
          cp $(find . -maxdepth 3 -name "ffmpeg" -type f | head -1) \
            src-tauri/binaries/${{ matrix.ffmpeg_bin }}
          chmod +x src-tauri/binaries/${{ matrix.ffmpeg_bin }}

      - name: Download ffmpeg sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest "${{ matrix.ffmpeg_url }}" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $exe = Get-ChildItem ffmpeg_tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $exe.FullName src-tauri/binaries/${{ matrix.ffmpeg_bin }}

      - name: Install frontend dependencies
        run: npm i

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Build Tauri app and upload to release
        uses: tauri-apps/tauri-action@v0
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "retoro player ${{ github.ref_name }}"
          releaseBody: "retoro player desktop build"
          releaseDraft: true
          prerelease: false