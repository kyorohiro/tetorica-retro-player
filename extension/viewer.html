<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetorica Retro Tab Filter</title>
    <link rel="stylesheet" href="./viewer.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <p class="eyebrow">Chrome Extension PoC</p>
          <h1>Retro Tab Filter</h1>
        </div>
        <button id="refreshButton" type="button">Recapture current tab</button>
      </header>

      <section class="panel">
        <div class="status-row">
          <span class="status-label">Status</span>
          <span id="statusText">Waiting for capture session...</span>
        </div>

        <div class="controls">
          <label class="control">
            <span>Preset</span>
            <select id="presetSelect">
              <option value="greenTerminal">Green Terminal</option>
              <option value="amberCrt">Amber CRT</option>
              <option value="monochrome">Mono</option>
              <option value="lcdIce">LCD Ice</option>
              <option value="pc98_512">PC-98 512-color</option>
            </select>
          </label>

          <label class="control control-toggle">
            <span>Lo-fi FX</span>
            <input id="audioFxEnabled" type="checkbox" checked />
          </label>

          <label class="control">
            <span>Lo-fi amount</span>
            <input
              id="lofiAmount"
              type="range"
              min="0"
              max="1"
              step="0.01"
              value="0.8"
            />
            <output id="lofiAmountValue">80%</output>
          </label>

          <label class="control control-toggle">
            <span>Spatial noise</span>
            <input id="noiseEnabled" type="checkbox" checked />
          </label>

          <label class="control">
            <span>Noise level</span>
            <input
              id="noiseLevel"
              type="range"
              min="0"
              max="0.12"
              step="0.001"
              value="0.02"
            />
            <output id="noiseLevelValue">2%</output>
          </label>
        </div>

        <div class="canvas-frame">
          <canvas id="glCanvas" width="1280" height="720"></canvas>
        </div>

        <video id="sourceVideo" autoplay muted playsinline hidden></video>
      </section>
    </main>

    <script type="module" src="./viewer.js"></script>
  </body>
</html>
