<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetorica Retro Tab Filter</title>
    <link rel="stylesheet" href="./viewer.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <a
          class="brand-link"
          href="https://kyorohiro.itch.io/tetorica-retro-player"
          target="_blank"
          rel="noreferrer"
        >
          tetorica-retro-player
        </a>
      </header>

      <section class="panel">
        <div class="status-row">
          <span class="status-label">Status</span>
          <span id="statusText">Waiting for capture session...</span>
          <button
            id="recordButton"
            class="fit-button icon-button"
            type="button"
            aria-label="Start recording"
            title="Start recording"
          >
            <svg class="icon icon-record" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="5.5" />
            </svg>
            <svg class="icon icon-stop" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="7" y="7" width="10" height="10" rx="1.5" />
            </svg>
          </button>
          <button
            id="fitButton"
            class="fit-button icon-button"
            type="button"
            aria-label="Fit to window"
            title="Fit to window"
          >
            <svg class="icon icon-fit" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 9V4h5" />
              <path d="M20 9V4h-5" />
              <path d="M4 15v5h5" />
              <path d="M20 15v5h-5" />
              <path d="M9 4 4 9" />
              <path d="M15 4l5 5" />
              <path d="m9 20-5-5" />
              <path d="m15 20 5-5" />
            </svg>
            <svg class="icon icon-unfit" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 4H4v5" />
              <path d="M15 4h5v5" />
              <path d="M9 20H4v-5" />
              <path d="M15 20h5v-5" />
              <path d="m4 4 5 5" />
              <path d="m20 4-5 5" />
              <path d="m4 20 5-5" />
              <path d="m20 20-5-5" />
            </svg>
          </button>
        </div>

        <div class="canvas-frame">
          <canvas id="glCanvas" width="1280" height="720"></canvas>
        </div>

        <video id="sourceVideo" autoplay muted playsinline hidden></video>
      </section>
    </main>

    <script type="module" src="./viewer.js"></script>
  </body>
</html>
