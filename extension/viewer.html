<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetorica Retro Tab Filter</title>
    <link rel="stylesheet" href="./viewer.css" />
  </head>
  <body>
    <main class="viewer-shell">
      <div class="canvas-frame">
        <canvas id="glCanvas" width="1280" height="720"></canvas>
      </div>
      <p id="statusText" class="status-overlay" hidden>
        Waiting for capture session...
      </p>
      <video id="sourceVideo" autoplay muted playsinline hidden></video>
    </main>

    <script type="module" src="./viewer.js"></script>
  </body>
</html>
