<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Tab Filter Controls</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <a
          class="brand-link"
          href="https://kyorohiro.itch.io/tetorica-retro-player"
          target="_blank"
          rel="noreferrer"
        >
          tetorica-retro-player
        </a>
      </header>

      <div class="actions">
        <button id="captureButton" type="button">Capture current tab</button>
        <button id="viewerButton" type="button" class="secondary">Show viewer</button>
        <button id="overlayButton" type="button" class="secondary action-wide">Overlay current video (Experimental)</button>
      </div>

      <p id="statusText" class="status">Ready.</p>

      <div class="tab-widget">
        <div class="tab-bar" role="tablist">
          <button class="tab-btn" role="tab" data-tab="video" aria-selected="true">Video</button>
          <button class="tab-btn" role="tab" data-tab="audio" aria-selected="false">Audio</button>
          <button class="tab-btn" role="tab" data-tab="overlay" aria-selected="false">Overlay</button>
          <button class="tab-btn" role="tab" data-tab="alarm" aria-selected="false">Alarm</button>
        </div>

        <section class="controls">
        <section class="control-group" data-tab-panel="video" aria-labelledby="videoControlsTitle">
          <div class="control-group-header">
            <p class="control-group-kicker">Video</p>
            <h2 id="videoControlsTitle">Screen and CRT filter</h2>
          </div>

          <label class="control">
            <span>Preset</span>
            <select id="presetSelect"></select>
          </label>

          <label class="control">
            <span>Palette</span>
            <select id="paletteMode"></select>
          </label>

          <label class="control">
            <span>Mono tint</span>
            <select id="monoTint"></select>
          </label>

          <label class="control">
            <span>Target width</span>
            <input id="targetWidth" type="range" min="1" max="2560" step="1" />
            <output id="targetWidthValue"></output>
          </label>

          <label class="control">
            <span>Target height</span>
            <input id="targetHeight" type="range" min="1" max="2560" step="1" />
            <output id="targetHeightValue"></output>
          </label>

          <label class="control control-toggle">
            <span>Match aspect</span>
            <input id="matchTargetAspect" type="checkbox" />
          </label>

          <label class="control">
            <span>Color levels</span>
            <input id="colorLevels" type="range" min="2" max="256" step="1" />
            <output id="colorLevelsValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Bayer dither</span>
              <span class="info-tip" tabindex="0" data-tip="Adds a dot pattern to smooth reduced colors. Higher values feel more gritty and low-color.">?</span>
            </span>
            <input id="ditherStrength" type="range" min="0" max="1" step="0.01" />
            <output id="ditherStrengthValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Smooth</span>
              <span class="info-tip" tabindex="0" data-tip="Blurs the source image before pixelating, softening pixel edges for a smoother, cel-like look.">?</span>
            </span>
            <input id="smoothStrength" type="range" min="0" max="1" step="0.01" />
            <output id="smoothStrengthValue"></output>
          </label>

          <section class="subsection crt-lcd-section" aria-labelledby="crtLcdTitle">
            <div class="subsection-header">
              <p class="subsection-kicker">Effects</p>
              <h3 id="crtLcdTitle">CRT / LCD</h3>
            </div>

          <label class="control">
            <span class="label-with-tip">
              <span>Curvature</span>
              <span class="info-tip" tabindex="0" data-tip="Bends the picture inward like curved CRT glass. Higher values make the edges bow more.">?</span>
            </span>
            <input id="curvature" type="range" min="0" max="0.2" step="0.01" />
            <output id="curvatureValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>CRT aspect</span>
              <span class="info-tip" tabindex="0" data-tip="Tweaks the screen shape so the image feels more like a real CRT tube.">?</span>
            </span>
            <input id="crtAspect" type="range" min="0.9" max="1.1" step="0.005" />
            <output id="crtAspectValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Scanline</span>
              <span class="info-tip" tabindex="0" data-tip="Adds broad horizontal dark bands like an old display. Higher values make the gaps more obvious.">?</span>
            </span>
            <input id="scanlineStrength" type="range" min="0" max="0.3" step="0.01" />
            <output id="scanlineStrengthValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Scanline 2</span>
              <span class="info-tip" tabindex="0" data-tip="Adds a finer second layer of line texture for a denser CRT stripe feel.">?</span>
            </span>
            <input id="scanline2Strength" type="range" min="0" max="0.1" step="0.005" />
            <output id="scanline2StrengthValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Scanline bright fade</span>
              <span class="info-tip" tabindex="0" data-tip="Makes scanlines fade out in bright areas. Higher values keep dark parts striped while bright parts glow more naturally.">?</span>
            </span>
            <input id="scanlineBrightnessFade" type="range" min="0" max="1" step="0.01" />
            <output id="scanlineBrightnessFadeValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Vignette</span>
              <span class="info-tip" tabindex="0" data-tip="Darkens the outer edges of the screen. Higher values pull more attention toward the center and can be exaggerated for a stronger retro frame.">?</span>
            </span>
            <input id="vignetteStrength" type="range" min="0" max="0.6" step="0.01" />
            <output id="vignetteStrengthValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Glow</span>
              <span class="info-tip" tabindex="0" data-tip="Adds a soft bloom around bright areas. Higher values make highlights spread and feel hotter.">?</span>
            </span>
            <input id="glowStrength" type="range" min="0" max="0.5" step="0.01" />
            <output id="glowStrengthValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Phosphor</span>
              <span class="info-tip" tabindex="0" data-tip="Adds subtle RGB triad variation like the glow structure of a CRT surface. Higher values make the screen texture more visible.">?</span>
            </span>
            <input id="phosphorStrength" type="range" min="0" max="0.5" step="0.01" />
            <output id="phosphorStrengthValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Close-up noise</span>
              <span class="info-tip" tabindex="0" data-tip="Adds fine animated grain so the screen feels less clean and more like a close-up filmed CRT.">?</span>
            </span>
            <input id="closeUpNoiseStrength" type="range" min="0" max="2" step="0.01" />
            <output id="closeUpNoiseStrengthValue"></output>
          </label>
          </section>

          <section class="subsection luma-tone-section" aria-labelledby="lumaToneTitle">
            <div class="subsection-header">
              <p class="subsection-kicker">Global tone</p>
              <h3 id="lumaToneTitle">Luma / Tone</h3>
            </div>

            <label class="control">
              <span class="label-with-tip">
                <span>Luma low</span>
                <span class="info-tip" tabindex="0" data-tip="Starts lifting darker areas below this luma range. Useful when shadows are crushed too hard.">?</span>
              </span>
              <input id="lumaLow" type="range" min="0" max="0.5" step="0.01" />
              <output id="lumaLowValue"></output>
            </label>

            <label class="control">
              <span class="label-with-tip">
                <span>Luma high</span>
                <span class="info-tip" tabindex="0" data-tip="Starts compressing brighter areas above this luma range, helping highlights roll off more gently.">?</span>
              </span>
              <input id="lumaHigh" type="range" min="0.5" max="1" step="0.01" />
              <output id="lumaHighValue"></output>
            </label>

            <label class="control">
              <span class="label-with-tip">
                <span>Luma knee</span>
                <span class="info-tip" tabindex="0" data-tip="Controls how hard or soft the luma transition feels. Lower is harder, higher is smoother.">?</span>
              </span>
              <input id="lumaKnee" type="range" min="0.02" max="0.5" step="0.01" />
              <output id="lumaKneeValue"></output>
            </label>
          </section>

          <section class="subsection phosphor-dot-section" aria-labelledby="phosphorDotTitle">
            <div class="subsection-header">
              <p class="subsection-kicker">Phosphor Dot only</p>
              <h3 id="phosphorDotTitle">Dot mask tuning</h3>
            </div>

            <label class="control">
              <span class="label-with-tip">
                <span>Spot mask</span>
                <span class="info-tip" tabindex="0" data-tip="Shapes each pixel into a darker-backed phosphor dot. Brighter pixels stay larger, so black gaps remain visible while highlights feel hotter.">?</span>
              </span>
              <input id="spotMaskStrength" type="range" min="0" max="1.0" step="0.01" />
              <output id="spotMaskStrengthValue"></output>
            </label>

            <label class="control control-toggle">
              <span>2x internal resolution</span>
              <input id="phosphorDotInternalScale" type="checkbox" />
            </label>

            <label class="control control-toggle">
              <span>Bright core</span>
              <input id="phosphorDotBrightCore" type="checkbox" />
            </label>

            <label class="control control-toggle">
              <span>Flat disc</span>
              <input id="phosphorDotFlatDisc" type="checkbox" />
            </label>

            <label class="control control-toggle">
              <span>Neighbor blend</span>
              <input id="phosphorDotNeighborBlend" type="checkbox" />
            </label>

            <label class="control">
              <span>Cell fill</span>
              <input id="phosphorDotCellFill" type="range" min="0" max="0.5" step="0.01" />
              <output id="phosphorDotCellFillValue"></output>
            </label>

            <label class="control">
              <span>Bulb radius</span>
              <input id="bulbRadius" type="range" min="0.001" max="0.5" step="0.001" />
              <output id="bulbRadiusValue"></output>
            </label>

            <label class="control">
              <span>Black floor</span>
              <input id="blackFloor" type="range" min="0" max="0.5" step="0.001" />
              <output id="blackFloorValue"></output>
            </label>

            <label class="control">
              <span class="label-with-tip">
                <span>Light level</span>
                <span class="info-tip" tabindex="0" data-tip="Phosphor Dot only. Uniformly dims or brightens the colored bulbs, like changing the drive voltage of the phosphor dots.">?</span>
              </span>
              <input id="phosphorDotLightBalance" type="range" min="0" max="2" step="0.01" />
              <output id="phosphorDotLightBalanceValue"></output>
            </label>
          </section>

          <section class="subsection anime-toon-section" aria-labelledby="animeToonTitle">
            <div class="subsection-header">
              <p class="subsection-kicker">Anime / Toon</p>
              <h3 id="animeToonTitle">Edge</h3>
            </div>

            <label class="control">
              <span class="label-with-tip">
                <span>Toon steps</span>
                <span class="info-tip" tabindex="0" data-tip="Posterizes shading into flat bands. 0 = off, higher values give stronger cartoon banding.">?</span>
              </span>
              <input id="toonSteps" type="range" min="0" max="16" step="1" />
              <output id="toonStepsValue"></output>
            </label>

            <label class="control">
              <span class="label-with-tip">
                <span>Edge boost</span>
                <span class="info-tip" tabindex="0" data-tip="Darkens detected edges for an ink-line effect. Works with Toon steps for anime outlines, or alone for a subtle CRT edge enhancement.">?</span>
              </span>
              <input id="edgeBoost" type="range" min="0" max="1.5" step="0.01" />
              <output id="edgeBoostValue"></output>
            </label>

            <label class="control">
              <span class="label-with-tip">
                <span>Edge low</span>
                <span class="info-tip" tabindex="0" data-tip="Lower threshold for anime edge detection. Edges weaker than this are ignored.">?</span>
              </span>
              <input id="animeEdgeLow" type="range" min="0" max="1" step="0.01" />
              <output id="animeEdgeLowValue"></output>
            </label>

            <label class="control">
              <span class="label-with-tip">
                <span>Edge high</span>
                <span class="info-tip" tabindex="0" data-tip="Upper threshold for anime edge detection. Edges stronger than this are fully drawn.">?</span>
              </span>
              <input id="animeEdgeHigh" type="range" min="0" max="1" step="0.01" />
              <output id="animeEdgeHighValue"></output>
            </label>
          </section>
        </section>

        <section class="control-group" data-tab-panel="audio" aria-labelledby="audioControlsTitle">
          <div class="control-group-header">
            <p class="control-group-kicker">Audio</p>
            <h2 id="audioControlsTitle">Retro sound effects</h2>
          </div>

          <label class="control">
            <span>Audio preset</span>
            <select id="audioPresetSelect"></select>
          </label>

          <label class="control control-toggle">
            <span>Effects on</span>
            <input id="audioFxEnabled" type="checkbox" />
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Lo-fi amount</span>
              <span class="info-tip" tabindex="0" data-tip="Cuts highs and adds rougher character, like cheaper playback hardware.">?</span>
            </span>
            <input id="lofiAmount" type="range" min="0" max="1" step="0.01" />
            <output id="lofiAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Radio tone</span>
              <span class="info-tip" tabindex="0" data-tip="Narrows the sound toward a small speaker or radio voice range, with extra mids in the center.">?</span>
            </span>
            <input id="radioToneAmount" type="range" min="0" max="1" step="0.01" />
            <output id="radioToneAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Bit crush</span>
              <span class="info-tip" tabindex="0" data-tip="Reduces amplitude precision for a rougher digital edge and crunchy sample feel.">?</span>
            </span>
            <input id="bitCrushAmount" type="range" min="0" max="1" step="0.01" />
            <output id="bitCrushAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Sample rate</span>
              <span class="info-tip" tabindex="0" data-tip="Holds each sample longer so the sound gets stair-stepped and cheap-digital.">?</span>
            </span>
            <input id="sampleRateReductionAmount" type="range" min="0" max="1" step="0.01" />
            <output id="sampleRateReductionAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Bass</span>
              <span class="info-tip" tabindex="0" data-tip="Boosts or cuts the low end like a simple amp tone stack.">?</span>
            </span>
            <input id="bassAmount" type="range" min="-1.5" max="1.5" step="0.01" />
            <output id="bassAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Mid</span>
              <span class="info-tip" tabindex="0" data-tip="Boosts or cuts the middle voice band where a lot of guitar and radio character lives.">?</span>
            </span>
            <input id="midAmount" type="range" min="-1.5" max="1.5" step="0.01" />
            <output id="midAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Treble</span>
              <span class="info-tip" tabindex="0" data-tip="Boosts or cuts the upper edge and brightness of the sound.">?</span>
            </span>
            <input id="trebleAmount" type="range" min="-1.5" max="1.5" step="0.01" />
            <output id="trebleAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Stereo width</span>
              <span class="info-tip" tabindex="0" data-tip="Narrows the left-right difference toward mono or pushes it wider for a broader stereo image.">?</span>
            </span>
            <input id="stereoWidthAmount" type="range" min="-1" max="1" step="0.01" />
            <output id="stereoWidthAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Small room</span>
              <span class="info-tip" tabindex="0" data-tip="Adds a short, boxy room reflection like a small speaker playing in a nearby room.">?</span>
            </span>
            <input id="smallSpeakerRoomAmount" type="range" min="0" max="1" step="0.01" />
            <output id="smallSpeakerRoomAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Wow & Flutter</span>
              <span class="info-tip" tabindex="0" data-tip="Adds slow and fast pitch wobble like tape or unstable rotating hardware.">?</span>
            </span>
            <input id="wowFlutterAmount" type="range" min="0" max="1" step="0.01" />
            <output id="wowFlutterAmountValue"></output>
          </label>

          <label class="control control-toggle">
            <span>Noise on</span>
            <input id="noiseEnabled" type="checkbox" />
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Surface hiss</span>
              <span class="info-tip" tabindex="0" data-tip="Controls the amount of added background hiss and room-like noise texture.">?</span>
            </span>
            <input id="noiseLevel" type="range" min="0" max="5" step="0.05" />
            <output id="noiseLevelValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Vinyl dust</span>
              <span class="info-tip" tabindex="0" data-tip="Adds crackle, pops, and dusty surface texture like an older record.">?</span>
            </span>
            <input id="vinylDustAmount" type="range" min="0" max="1" step="0.01" />
            <output id="vinylDustAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Noise Reduction</span>
              <span class="info-tip" tabindex="0" data-tip="Applies a post-process low-pass to reduce high-frequency noise after bit-crushing.">?</span>
            </span>
            <input id="noiseReductionAmount" type="range" min="0" max="1" step="0.01" />
            <output id="noiseReductionAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Tape Saturation</span>
              <span class="info-tip" tabindex="0" data-tip="Applies warm tape-style harmonic saturation after the EQ stage.">?</span>
            </span>
            <input id="tapeSaturationAmount" type="range" min="0" max="1" step="0.01" />
            <output id="tapeSaturationAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Delay</span>
              <span class="info-tip" tabindex="0" data-tip="Adds an echo delay effect with feedback.">?</span>
            </span>
            <input id="delayAmount" type="range" min="0" max="1" step="0.01" />
            <output id="delayAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Reverb</span>
              <span class="info-tip" tabindex="0" data-tip="Adds hall reverb for a spacious, roomy sound.">?</span>
            </span>
            <input id="reverbAmount" type="range" min="0" max="1" step="0.01" />
            <output id="reverbAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Chorus</span>
              <span class="info-tip" tabindex="0" data-tip="Adds a chorus modulation effect for a richer, wider sound.">?</span>
            </span>
            <input id="chorusAmount" type="range" min="0" max="1" step="0.01" />
            <output id="chorusAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Compressor</span>
              <span class="info-tip" tabindex="0" data-tip="Bus compressor: controls dynamic range and adds punch.">?</span>
            </span>
            <input id="compressorAmount" type="range" min="0" max="1" step="0.01" />
            <output id="compressorAmountValue"></output>
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>FX Output Trim</span>
              <span class="info-tip" tabindex="0" data-tip="Final output gain trim after all effects processing.">?</span>
            </span>
            <input id="fxOutputTrimAmount" type="range" min="0" max="1" step="0.01" />
            <output id="fxOutputTrimAmountValue"></output>
          </label>
        </section>

        <section class="control-group" data-tab-panel="overlay" aria-labelledby="overlayControlsTitle">
          <div class="control-group-header">
            <p class="control-group-kicker">Overlay</p>
            <h2 id="overlayControlsTitle">Multiple target behavior</h2>
          </div>

          <label class="control control-toggle">
            <span>Target video</span>
            <input id="overlayVideo" type="checkbox" />
          </label>

          <label class="control control-toggle">
            <span>Target image</span>
            <input id="overlayImage" type="checkbox" />
          </label>

          <label class="control control-toggle">
            <span>Show option buttons</span>
            <input id="showOverlayButtons" type="checkbox" />
          </label>

          <label class="control">
            <span class="label-with-tip">
              <span>Simultaneous overlays</span>
              <span class="info-tip" tabindex="0" data-tip="How many media targets to retro-process at once. More targets can be much heavier.">?</span>
            </span>
            <input id="overlayTargetCount" type="range" min="1" max="6" step="1" />
            <output id="overlayTargetCountValue"></output>
            <small class="control-hint">
              Order: current hover, default [0], previous hover, then auto-picked videos.
            </small>
          </label>
        </section>

        <section class="control-group" data-tab-panel="alarm" aria-labelledby="alarmControlsTitle">
          <div class="control-group-header">
            <p class="control-group-kicker">Alarm <span class="experimental-badge">Experimental</span></p>
            <h2 id="alarmControlsTitle">Wake-up timer</h2>
          </div>

          <p id="alarmStatusText" class="alarm-status">No alarm set.</p>

          <div class="alarm-time-row">
            <input id="alarmTimeInput" type="time" class="alarm-time-input" />
            <button id="alarmSetButton" type="button">Set</button>
          </div>

          <div class="alarm-quick-grid">
            <button type="button" class="alarm-quick-btn" data-minutes="3">3m</button>
            <button type="button" class="alarm-quick-btn" data-minutes="5">5m</button>
            <button type="button" class="alarm-quick-btn" data-minutes="10">10m</button>
            <button type="button" class="alarm-quick-btn" data-minutes="25">25m</button>
            <button type="button" class="alarm-quick-btn" data-minutes="50">50m</button>
          </div>

          <button id="alarmOffButton" type="button" class="secondary" style="display:none; width:100%; margin-top:6px;">Alarm Off</button>
        </section>
        </section>
      </div>

      <footer class="footer">
        <a
          class="store-link store-link-footer"
          href="https://kyorohiro.itch.io/tetorica-retro-player"
          target="_blank"
          rel="noreferrer"
        >
          Visit full app page
        </a>
        <button id="resetButton" type="button" class="secondary reset-btn">Reset all settings</button>
      </footer>
    </main>
