<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetorica Retro Player</title>
     <link rel="manifest" href="./manifest.webmanifest">
    <script>
      const isLoopbackHost = ["localhost", "127.0.0.1", "::1"].includes(window.location.hostname);
      const isTauriEnv = typeof window.__TAURI_INTERNALS__ !== "undefined" || typeof window.__TAURI__ !== "undefined";

      if ("serviceWorker" in navigator) {
        if (!isLoopbackHost && !isTauriEnv) {
          navigator.serviceWorker.register("./sw.js");
        } else {
          // localhost / Tauri では SW を使わないので既存の SW と Cache Storage を削除
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var r of registrations) { r.unregister(); }
          });
          caches.keys().then(function(keys) {
            for (var k of keys) { caches.delete(k); }
          });
        }
      }
    </script>
    <script type="module" crossorigin src="./assets/index-cXKMMAoN.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CSF3fvcY.css">
  </head>

  </body>
</html>
